<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewoven Survey - Admin Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #2E7D32;
            --primary-light: #4CAF50;
            --primary-dark: #1B5E20;
            --accent: #81C784;
            --bg: #F5FBF5;
            --surface: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #555;
            --border: #C8E6C9;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(46,125,50,0.08);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Auth screen */
        .auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .auth-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 40px 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .auth-card h2 {
            color: var(--primary-dark);
            margin-bottom: 8px;
        }
        .auth-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .auth-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            margin-bottom: 16px;
            text-align: center;
        }
        .auth-input:focus { outline: none; border-color: var(--primary); }
        .auth-error {
            color: #D32F2F;
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: none;
        }
        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            background: var(--primary);
            color: white;
            width: 100%;
        }
        .btn:hover { background: var(--primary-dark); }

        /* Dashboard */
        .dashboard { display: none; }
        .header {
            background: rgba(255,255,255,0.95);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }
        .logo span { color: var(--primary-light); }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .btn-sm {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--primary); }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* Stats row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .stat-card .label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-dark);
        }
        .stat-card .sub {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Chart grid */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        @media (max-width: 560px) {
            .chart-grid { grid-template-columns: 1fr; }
        }
        .chart-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .chart-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
        }
        .chart-wrap {
            position: relative;
            width: 100%;
            max-height: 320px;
        }

        /* Responses table */
        .table-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 32px;
        }
        .table-card h3 {
            padding: 20px 24px 16px;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .table-scroll { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            background: #F1F8F1;
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
        }
        td {
            padding: 10px 14px;
            border-bottom: 1px solid #eee;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        tr:hover td { background: #FAFFF9; }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }
        .empty-state h3 { color: var(--text); margin-bottom: 8px; }

        .source-toggle {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .source-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .source-dot.supabase { background: var(--primary); }
        .source-dot.local { background: #FF9800; }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h2>Admin Access</h2>
            <p>Enter the password to view survey results.</p>
            <input type="password" class="auth-input" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter')authenticate()">
            <div class="auth-error" id="authError">Incorrect password. Please try again.</div>
            <button class="btn" onclick="authenticate()">View Results</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <header class="header">
            <div class="header-inner">
                <a href="/survey/" class="logo">Re<span>woven</span> <small style="font-weight:400;font-size:0.75rem;color:var(--text-secondary);margin-left:4px;">Survey Results</small></a>
                <div class="header-actions">
                    <div class="source-toggle" id="sourceInfo"></div>
                    <button class="btn-sm btn-outline" onclick="exportCSV()">Export CSV</button>
                    <button class="btn-sm btn-outline" onclick="loadData()">Refresh</button>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="stats-row" id="statsRow"></div>
            <div class="chart-grid" id="chartGrid"></div>
            <div class="table-card">
                <h3>All Responses</h3>
                <div class="table-scroll" id="tableContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rgrzktwjvtalczaszxfx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJncnprdHdqdnRhbGN6YXN6eGZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMzcwMzEsImV4cCI6MjA4NTcxMzAzMX0.-zo5zf6q6GiIEFdc8yyegtZr3YFzlno8ndxbKKig3eE';
        const PASSWORD = 'rewoven2026';

        let allResponses = [];

        function authenticate() {
            const pw = document.getElementById('passwordInput').value;
            if (pw === PASSWORD) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
            } else {
                document.getElementById('authError').style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        async function loadData() {
            let supabaseData = [];
            let localData = JSON.parse(localStorage.getItem('rewoven_survey_responses') || '[]');

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/survey_responses?select=*&order=submitted_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                if (res.ok) {
                    supabaseData = await res.json();
                }
            } catch (e) {
                console.warn('Could not fetch from Supabase:', e);
            }

            // Merge, preferring Supabase data, dedup by submitted_at
            const seen = new Set();
            allResponses = [];
            for (const r of supabaseData) {
                seen.add(r.submitted_at);
                r._source = 'supabase';
                allResponses.push(r);
            }
            for (const r of localData) {
                if (!seen.has(r.submitted_at)) {
                    r._source = 'local';
                    allResponses.push(r);
                }
            }

            const supaCount = supabaseData.length;
            const localCount = allResponses.filter(r => r._source === 'local').length;
            document.getElementById('sourceInfo').innerHTML =
                `<span class="source-dot supabase"></span> ${supaCount} cloud` +
                (localCount > 0 ? ` &nbsp;<span class="source-dot local"></span> ${localCount} local` : '');

            renderDashboard();
        }

        function renderDashboard() {
            if (allResponses.length === 0) {
                document.getElementById('statsRow').innerHTML = '';
                document.getElementById('chartGrid').innerHTML = '';
                document.getElementById('tableContainer').innerHTML = '<div class="empty-state"><h3>No responses yet</h3><p>Share the survey link to start collecting data.</p></div>';
                return;
            }

            renderStats();
            renderCharts();
            renderTable();
        }

        function renderStats() {
            const total = allResponses.length;
            const avgInterest = allResponses.reduce((s, r) => s + (parseInt(r.app_interest) || 0), 0) / total;
            const avgAwareness = allResponses.reduce((s, r) => s + (parseInt(r.waste_awareness) || 0), 0) / total;
            const avgConcern = allResponses.reduce((s, r) => s + (parseInt(r.uae_climate_concern) || 0), 0) / total;

            document.getElementById('statsRow').innerHTML = `
                <div class="stat-card">
                    <div class="label">Total Responses</div>
                    <div class="value">${total}</div>
                    <div class="sub">all time</div>
                </div>
                <div class="stat-card">
                    <div class="label">Avg App Interest</div>
                    <div class="value">${avgInterest.toFixed(1)}<small style="font-size:0.9rem;color:var(--text-secondary)">/5</small></div>
                    <div class="sub">scale rating</div>
                </div>
                <div class="stat-card">
                    <div class="label">Avg Waste Awareness</div>
                    <div class="value">${avgAwareness.toFixed(1)}<small style="font-size:0.9rem;color:var(--text-secondary)">/5</small></div>
                    <div class="sub">scale rating</div>
                </div>
                <div class="stat-card">
                    <div class="label">Avg Climate Concern</div>
                    <div class="value">${avgConcern.toFixed(1)}<small style="font-size:0.9rem;color:var(--text-secondary)">/5</small></div>
                    <div class="sub">scale rating</div>
                </div>
            `;
        }

        function countField(field) {
            const counts = {};
            for (const r of allResponses) {
                const val = r[field];
                if (!val) continue;
                // Handle comma-separated multi-select fields
                const items = val.includes(', ') ? val.split(', ') : [val];
                for (const item of items) {
                    counts[item] = (counts[item] || 0) + 1;
                }
            }
            return counts;
        }

        const greens = [
            '#1B5E20', '#2E7D32', '#388E3C', '#43A047', '#4CAF50',
            '#66BB6A', '#81C784', '#A5D6A7', '#C8E6C9', '#E8F5E9'
        ];

        function makeChart(canvasId, type, labels, data, title) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const colors = labels.map((_, i) => greens[i % greens.length]);
            new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: type === 'bar' ? 'rgba(76,175,80,0.7)' : colors,
                        borderColor: type === 'bar' ? '#2E7D32' : colors.map(c => c),
                        borderWidth: type === 'pie' || type === 'doughnut' ? 2 : 1,
                        borderRadius: type === 'bar' ? 6 : 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: type === 'doughnut' || type === 'pie',
                            position: 'bottom',
                            labels: { font: { family: 'Inter', size: 11 }, padding: 12 }
                        }
                    },
                    scales: type === 'bar' ? {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } },
                        x: { ticks: { font: { size: 11 }, maxRotation: 45 } }
                    } : {}
                }
            });
        }

        function renderCharts() {
            const charts = [
                { field: 'age_range', title: 'Age Distribution', type: 'doughnut' },
                { field: 'location', title: 'Location (UAE)', type: 'doughnut' },
                { field: 'clothing_frequency', title: 'Shopping Frequency', type: 'bar' },
                { field: 'monthly_spend', title: 'Monthly Clothing Spend', type: 'bar' },
                { field: 'fashion_climate_link', title: 'Fast Fashion & Climate Link', type: 'doughnut' },
                { field: 'sustainable_fashion_knowledge', title: 'Sustainability Knowledge', type: 'bar' },
                { field: 'sustainability_barriers', title: 'Barriers to Sustainability', type: 'bar' },
                { field: 'desired_features', title: 'Most Desired App Features', type: 'bar' },
                { field: 'discard_method', title: 'Clothing Disposal Methods', type: 'bar' },
                { field: 'education_interest', title: 'Interest in Educational Content', type: 'doughnut' },
            ];

            let html = '';
            charts.forEach((c, i) => {
                const counts = countField(c.field);
                if (Object.keys(counts).length === 0) return;
                html += `<div class="chart-card">
                    <h3>${c.title}</h3>
                    <div class="chart-wrap"><canvas id="chart${i}"></canvas></div>
                </div>`;
            });

            document.getElementById('chartGrid').innerHTML = html;

            // Render after DOM update
            requestAnimationFrame(() => {
                charts.forEach((c, i) => {
                    const counts = countField(c.field);
                    if (Object.keys(counts).length === 0) return;
                    const labels = Object.keys(counts);
                    const data = Object.values(counts);
                    makeChart(`chart${i}`, c.type, labels, data, c.title);
                });
            });
        }

        function renderTable() {
            const fields = [
                'submitted_at', 'age_range', 'location', 'clothing_frequency', 'monthly_spend',
                'discard_method', 'waste_awareness', 'uae_climate_concern', 'fashion_climate_link',
                'sustainable_fashion_knowledge', 'sustainability_barriers', 'app_interest',
                'desired_features', 'education_interest', 'additional_thoughts'
            ];
            const headers = [
                'Date', 'Age', 'Location', 'Shopping Freq.', 'Monthly Spend',
                'Disposal', 'Awareness', 'Climate Concern', 'Fashion-Climate Link',
                'Sust. Knowledge', 'Barriers', 'App Interest',
                'Desired Features', 'Education Interest', 'Additional Thoughts'
            ];

            let html = '<table><thead><tr>';
            headers.forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';

            for (const r of allResponses) {
                html += '<tr>';
                fields.forEach(f => {
                    let val = r[f] || '-';
                    if (f === 'submitted_at' && val !== '-') {
                        val = new Date(val).toLocaleString('en-AE', { dateStyle: 'short', timeStyle: 'short' });
                    }
                    html += `<td title="${String(val).replace(/"/g, '&quot;')}">${val}</td>`;
                });
                html += '</tr>';
            }

            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }

        function exportCSV() {
            if (allResponses.length === 0) return;
            const fields = Object.keys(allResponses[0]).filter(k => k !== '_source');
            let csv = fields.join(',') + '\n';
            for (const r of allResponses) {
                csv += fields.map(f => {
                    let v = String(r[f] || '').replace(/"/g, '""');
                    return `"${v}"`;
                }).join(',') + '\n';
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `rewoven-survey-${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        }

        // Auto-focus password input
        document.getElementById('passwordInput').focus();
    </script>
</body>
</html>
