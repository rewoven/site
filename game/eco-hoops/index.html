<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />
    <link rel="stylesheet" href="assets/css/app.css" type="text/css" />
    <link rel="icon" href="../../assets/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>Eco Hoops | Rewoven Games</title>
    <style>
        /* Rewoven top bar */
        .rw-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px;
            background: linear-gradient(180deg, rgba(6,78,59,0.95) 0%, rgba(6,78,59,0.7) 80%, transparent);
            font-family: 'Inter', sans-serif; pointer-events: none;
        }
        .rw-bar > * { pointer-events: auto; }
        .rw-bar a { color: #A7F3D0; text-decoration: none; font-weight: 700; font-size: 13px; }
        .rw-bar a:hover { color: #34D399; }
        .rw-bar .rw-title { color: #fff; font-weight: 800; font-size: 15px; text-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        .rw-back { padding: 4px 12px; border: 1px solid rgba(167,243,208,0.3); border-radius: 8px; }
        .rw-back:hover { background: rgba(167,243,208,0.1); }

        /* Trivia overlay */
        .trivia-overlay {
            position: fixed; inset: 0; z-index: 99999;
            display: none; align-items: center; justify-content: center;
            background: rgba(10,14,26,0.92); backdrop-filter: blur(8px);
            font-family: 'Inter', sans-serif;
        }
        .trivia-overlay.show { display: flex; }
        .trivia-card {
            background: linear-gradient(135deg, #1E293B, #0F172A);
            border: 1px solid rgba(52,211,153,0.2); border-radius: 22px;
            padding: 36px; max-width: 500px; width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: trivPop 0.35s ease;
            color: #fff;
        }
        @keyframes trivPop { from { transform: scale(0.92) translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }
        .trivia-badge {
            background: linear-gradient(135deg, #10B981, #059669);
            color: #fff; font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1.5px; padding: 6px 14px; border-radius: 20px;
            display: inline-block; margin-bottom: 18px;
        }
        .trivia-q { font-size: 19px; font-weight: 700; line-height: 1.45; margin-bottom: 22px; }
        .trivia-opts { display: flex; flex-direction: column; gap: 10px; }
        .t-opt {
            padding: 14px 18px; border: 2px solid rgba(255,255,255,0.08);
            border-radius: 12px; background: rgba(255,255,255,0.02);
            color: #fff; font-size: 15px; cursor: pointer; text-align: left;
            font-family: 'Inter', sans-serif; transition: all 0.2s;
            display: flex; align-items: center; gap: 12px;
        }
        .t-opt:hover { border-color: #34D399; background: rgba(52,211,153,0.06); }
        .t-opt.right { border-color: #10B981; background: rgba(16,185,129,0.18); color: #A7F3D0; pointer-events: none; }
        .t-opt.wrong { border-color: #EF4444; background: rgba(239,68,68,0.12); color: #FCA5A5; pointer-events: none; }
        .t-opt .letter {
            width: 28px; height: 28px; border-radius: 8px;
            background: rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 12px; flex-shrink: 0;
        }
        .trivia-res {
            margin-top: 14px; padding: 14px 18px; border-radius: 12px;
            font-size: 13px; line-height: 1.5; display: none;
        }
        .trivia-res.show { display: block; }
        .trivia-res.ok { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #A7F3D0; }
        .trivia-res.no { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15); color: #FCA5A5; }
        .trivia-skip {
            margin-top: 14px; background: none; border: none;
            color: #475569; font-size: 13px; cursor: pointer;
            font-family: 'Inter', sans-serif; padding: 8px;
        }
        .trivia-skip:hover { color: #94A3B8; }

        /* Rewoven branding watermark */
        .rw-watermark {
            position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
            z-index: 9998; font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 700; color: rgba(167,243,208,0.3);
            letter-spacing: 1px; text-transform: uppercase; pointer-events: none;
        }

        /* Eco score display */
        .trivia-score {
            position: fixed; bottom: 8px; right: 16px; z-index: 9998;
            font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700;
            color: rgba(167,243,208,0.5); pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Rewoven Nav Bar -->
    <div class="rw-bar">
        <a href="/game/">← Rewoven Games</a>
        <span class="rw-title">🏀 Eco Hoops</span>
        <a href="/game/" class="rw-back">Back</a>
    </div>

    <!-- Basketball Legends Game -->
    <div id="content"></div>
    <div id="orientation"></div>
    <div id="loader">Loading ...</div>

    <!-- Trivia Overlay -->
    <div class="trivia-overlay" id="triviaOverlay">
        <div class="trivia-card">
            <div class="trivia-badge">♻️ Sustainability Trivia</div>
            <div class="trivia-q" id="triviaQ"></div>
            <div class="trivia-opts" id="triviaOpts"></div>
            <div class="trivia-res" id="triviaRes"></div>
            <button class="trivia-skip" id="triviaSkip" onclick="closeTrivia()">Skip →</button>
        </div>
    </div>

    <!-- Rewoven Watermark -->
    <div class="rw-watermark">Powered by Rewoven</div>
    <div class="trivia-score" id="triviaScoreDisplay"></div>

    <!-- Game Scripts -->
    <script src="patch/js/poki-sdk.js"></script>
    <script type="text/javascript" src="assets/lib/nape.min.js">
        var nape = "nape.min.js";
    </script>
    <script type="text/javascript" src="assets/lib/jquery-3.1.1.min.js"></script>
    <script type="text/javascript" src="assets/lib/easeljs-0.8.2.combined.js"></script>
    <script type="text/javascript" src="assets/lib/phaser.min.js"></script>
    <script type="text/javascript" src="assets/lib/phaser-cachebuster.min.js"></script>
    <script type="text/javascript" src="assets/lib/phaser-super-storage.min.js"></script>
    <script type="text/javascript" src="assets/lib/dragonBones.min.js"></script>
    <script type="text/javascript" src="assets/lib/pksl.js"></script>
    <script type="text/javascript" src="basketball_legends_2020.min.js?94d98243d8a70da6700e"></script>

    <!-- Sustainability Trivia System -->
    <script>
    (function() {
        'use strict';

        var TRIVIA = [
            { q: "How much water does it take to make 1 cotton t-shirt?", o: ["700 litres", "2,700 litres", "500 litres", "10,000 litres"], c: 1, f: "~2,700 litres — enough drinking water for one person for 2.5 years." },
            { q: "What percentage of textiles end up in landfills?", o: ["25%", "45%", "73%", "90%"], c: 2, f: "73% of the world's textiles end up in landfills or are incinerated." },
            { q: "Fashion's share of global carbon emissions?", o: ["2%", "5%", "10%", "20%"], c: 2, f: "~10% — more than international flights and shipping combined." },
            { q: "How many times is a garment worn on average?", o: ["7 times", "20 times", "50 times", "100 times"], c: 0, f: "Just 7 times on average before being discarded." },
            { q: "Which material takes the longest to decompose?", o: ["Cotton", "Wool", "Polyester", "Linen"], c: 2, f: "Polyester can take up to 200 years, releasing microplastics the entire time." },
            { q: "What is circular fashion?", o: ["Round-shaped clothes", "Clothes recycled into new ones", "Wearing clothes in rotation", "Repeating fashion trends"], c: 1, f: "Designing clothes to be reused, repaired, and recycled — keeping materials in use." },
            { q: "What is greenwashing?", o: ["Eco-friendly laundry", "Misleading eco claims by brands", "Using green dye", "Recycling green clothes"], c: 1, f: "When brands make misleading claims about how eco-friendly their products are." },
            { q: "How much textile waste is produced globally per year?", o: ["10 million tonnes", "50 million tonnes", "92 million tonnes", "200 million tonnes"], c: 2, f: "Over 92 million tonnes of textile waste annually — and growing." },
            { q: "What is upcycling?", o: ["Throwing clothes away", "Donating old clothes", "Turning waste into better products", "Buying more clothes"], c: 2, f: "Transforming waste materials into new, higher-value products." },
            { q: "What do synthetic clothes release when washed?", o: ["Vitamins", "Microplastics", "Fragrance", "Oxygen"], c: 1, f: "~700,000 microplastic fibres are released in a single wash load." },
            { q: "Which fibre has the lowest water footprint?", o: ["Cotton", "Polyester", "Linen", "Nylon"], c: 2, f: "Linen uses far less water than cotton and can grow in poor soil." },
            { q: "How many garments are produced globally each year?", o: ["10 billion", "50 billion", "100 billion", "150 billion"], c: 2, f: "100 billion garments — about 14 for every person on Earth." },
            { q: "What percentage of clothes are recycled globally?", o: ["Less than 1%", "12%", "25%", "40%"], c: 0, f: "Less than 1% of clothing is recycled into new clothing." },
            { q: "How many litres of water to produce one pair of jeans?", o: ["1,000", "3,500", "7,500", "15,000"], c: 2, f: "About 7,500 litres — equivalent to running a garden hose for 2 days." },
            { q: "The UAE generates how much textile waste annually?", o: ["100K tonnes", "500K tonnes", "1.5M tonnes", "5M tonnes"], c: 2, f: "The UAE generates over 1.5 million tonnes of textile waste every year." }
        ];

        var triviaUsed = [];
        var triviaScore = 0;
        var triviaTotal = 0;
        var triviaInterval = null;

        // Show trivia every 90 seconds during gameplay
        function startTriviaTimer() {
            if (triviaInterval) clearInterval(triviaInterval);
            triviaInterval = setInterval(function() {
                var canvas = document.querySelector('canvas');
                if (canvas && canvas.offsetParent !== null && !document.getElementById('triviaOverlay').classList.contains('show')) {
                    showTrivia();
                }
            }, 90000);
        }

        function showTrivia() {
            if (triviaUsed.length >= TRIVIA.length) triviaUsed = [];
            var avail = TRIVIA.filter(function(_, i) { return triviaUsed.indexOf(i) === -1; });
            var ri = Math.floor(Math.random() * avail.length);
            var q = avail[ri];
            triviaUsed.push(TRIVIA.indexOf(q));

            document.getElementById('triviaQ').textContent = q.q;
            var oc = document.getElementById('triviaOpts');
            var rc = document.getElementById('triviaRes');
            rc.className = 'trivia-res'; rc.style.display = 'none';
            document.getElementById('triviaSkip').style.display = '';

            var letters = ['A', 'B', 'C', 'D'];
            oc.innerHTML = q.o.map(function(o, i) {
                return '<button class="t-opt" data-i="' + i + '"><span class="letter">' + letters[i] + '</span><span>' + o + '</span></button>';
            }).join('');

            oc.querySelectorAll('.t-opt').forEach(function(b) {
                b.onclick = function() {
                    var i = parseInt(b.dataset.i);
                    var ok = i === q.c;
                    triviaTotal++;
                    oc.querySelectorAll('.t-opt').forEach(function(x, j) {
                        x.style.pointerEvents = 'none';
                        if (j === q.c) x.classList.add('right');
                        if (j === i && !ok) x.classList.add('wrong');
                    });
                    document.getElementById('triviaSkip').style.display = 'none';
                    if (ok) {
                        triviaScore++;
                        rc.className = 'trivia-res show ok';
                        rc.innerHTML = '<strong>Correct! ✅</strong><br>' + q.f;
                    } else {
                        rc.className = 'trivia-res show no';
                        rc.innerHTML = '<strong>Not quite ❌</strong><br>' + q.f;
                    }
                    updateTriviaDisplay();
                    setTimeout(closeTrivia, 2800);
                };
            });

            document.getElementById('triviaOverlay').classList.add('show');
        }

        function updateTriviaDisplay() {
            var el = document.getElementById('triviaScoreDisplay');
            if (triviaTotal > 0) {
                el.textContent = '♻️ Eco Score: ' + triviaScore + '/' + triviaTotal;
            }
        }

        window.closeTrivia = function() {
            document.getElementById('triviaOverlay').classList.remove('show');
        };

        window.showTrivia = showTrivia;

        // Start trivia timer when game canvas appears
        var observer = new MutationObserver(function() {
            if (document.querySelector('canvas')) {
                startTriviaTimer();
                observer.disconnect();
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });

        // Mute all audio — user requested no sound
        var OrigAudio = window.Audio;
        window.Audio = function(src) {
            var a = new OrigAudio(src);
            a.volume = 0;
            a.muted = true;
            return a;
        };
        // Mute any audio/video elements that get created
        setInterval(function() {
            document.querySelectorAll('audio, video').forEach(function(el) {
                el.volume = 0;
                el.muted = true;
            });
        }, 500);

        document.title = 'Eco Hoops | Rewoven Games';
    })();
    </script>
</body>
</html>
