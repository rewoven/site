<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />
    <link rel="stylesheet" href="assets/css/app.css" type="text/css" />
    <title>Eco Hoops | Rewoven Games</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <style>
        /* Rewoven overlay styles */
        #rewoven-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: linear-gradient(180deg, rgba(6, 78, 59, 0.95) 0%, rgba(6, 78, 59, 0.7) 70%, transparent 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            pointer-events: none;
        }
        #rewoven-nav > * { pointer-events: auto; }
        .rewoven-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #A7F3D0;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.5px;
        }
        .rewoven-brand:hover { color: #34D399; }
        .rewoven-title {
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .rewoven-back {
            color: #A7F3D0;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 14px;
            border: 1px solid rgba(167, 243, 208, 0.3);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .rewoven-back:hover {
            background: rgba(167, 243, 208, 0.1);
            border-color: rgba(167, 243, 208, 0.5);
        }

        /* Trivia overlay */
        #eco-trivia-overlay {
            position: fixed;
            inset: 0;
            z-index: 9998;
            background: rgba(10, 14, 26, 0.92);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        #eco-trivia-overlay.active { display: flex; }
        .trivia-card {
            background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
            border: 1px solid rgba(52, 211, 153, 0.25);
            border-radius: 24px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            animation: triviaIn 0.4s ease;
        }
        @keyframes triviaIn {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .trivia-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .trivia-badge {
            background: linear-gradient(135deg, #10B981, #059669);
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 6px 14px;
            border-radius: 20px;
        }
        .trivia-bonus {
            color: #F59E0B;
            font-size: 12px;
            font-weight: 700;
        }
        .trivia-question {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .trivia-options { display: flex; flex-direction: column; gap: 10px; }
        .trivia-opt {
            padding: 14px 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .trivia-opt:hover { border-color: #34D399; background: rgba(52, 211, 153, 0.08); }
        .trivia-opt.correct { border-color: #10B981; background: rgba(16, 185, 129, 0.2); color: #A7F3D0; }
        .trivia-opt.wrong { border-color: #EF4444; background: rgba(239, 68, 68, 0.15); color: #FCA5A5; }
        .trivia-opt .opt-letter {
            width: 30px; height: 30px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 13px; flex-shrink: 0;
        }
        .trivia-result {
            margin-top: 18px;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
        }
        .trivia-result.show { display: block; }
        .trivia-result.correct-r { background: rgba(16, 185, 129, 0.12); border: 1px solid rgba(16, 185, 129, 0.25); color: #A7F3D0; }
        .trivia-result.wrong-r { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #FCA5A5; }
        .trivia-skip {
            margin-top: 16px;
            text-align: center;
        }
        .trivia-skip-btn {
            background: none;
            border: none;
            color: #64748B;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            padding: 8px 16px;
        }
        .trivia-skip-btn:hover { color: #94A3B8; }

        /* Score popup */
        .eco-score-popup {
            position: fixed;
            top: 50px;
            right: 20px;
            z-index: 9997;
            background: linear-gradient(135deg, #10B981, #059669);
            color: #fff;
            padding: 12px 20px;
            border-radius: 14px;
            font-family: 'Inter', system-ui, sans-serif;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4);
            transform: translateX(200%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .eco-score-popup.show { transform: translateX(0); }

        @media (max-width: 600px) {
            #rewoven-nav { padding: 6px 10px; }
            .rewoven-title { font-size: 13px; }
            .rewoven-back { font-size: 11px; padding: 4px 10px; }
            .trivia-card { padding: 24px; }
            .trivia-question { font-size: 17px; }
        }
    </style>

<body>

    <div id="rewoven-nav">
        <a href="/game/" class="rewoven-brand">Rewoven Games</a>
        <span class="rewoven-title">Eco Hoops</span>
        <a href="/game/" class="rewoven-back">Back to Games</a>

    <!-- Trivia overlay (shown during commercial breaks) -->
    <div id="eco-trivia-overlay">
        <div class="trivia-card">
            <div class="trivia-header">
                <span class="trivia-badge">Sustainability Trivia</span>

    <!-- Trivia system (runs before game scripts to intercept PokiSDK) -->
    <script>
    // ═══════════════════════════════════════════════════
    // SUSTAINABILITY TRIVIA QUESTIONS
    // ═══════════════════════════════════════════════════
    const ECO_TRIVIA = [
        {q:"How many litres of water does it take to make one cotton t-shirt?", o:["700","2,700","500","10,000"], c:1, f:"A single cotton t-shirt needs ~2,700 litres of water -- enough drinking water for 2.5 years."},
        {q:"What percentage of textiles end up in landfills annually?", o:["25%","45%","73%","90%"], c:2, f:"About 73% of all textiles produced end up in landfills or are incinerated."},
        {q:"What is fashion's share of global carbon emissions?", o:["2%","5%","10%","20%"], c:2, f:"Fashion produces ~10% of global CO2 emissions -- more than international flights and maritime shipping combined."},
        {q:"How many times is the average garment worn before being discarded?", o:["7","20","50","100"], c:0, f:"The average garment is worn only 7 times before being thrown away."},
        {q:"Which material takes the longest to decompose?", o:["Cotton","Wool","Polyester","Linen"], c:2, f:"Polyester can take up to 200 years to decompose, releasing microplastics into soil and water."},
        {q:"What does 'circular fashion' mean?", o:["Round-shaped clothes","Clothes recycled into new ones","Wearing in rotation","Repeating old trends"], c:1, f:"Circular fashion means designing clothes to be reused, repaired, and recycled -- keeping materials in use as long as possible."},
        {q:"What is greenwashing?", o:["Eco-friendly laundry","Misleading environmental claims","Using green dye","Recycling green fabrics"], c:1, f:"Greenwashing is when brands make misleading claims about how environmentally friendly their products are."},
        {q:"How much textile waste is produced globally each year?", o:["10M tonnes","50M tonnes","92M tonnes","200M tonnes"], c:2, f:"Over 92 million tonnes of textile waste is produced annually worldwide."},
        {q:"What is upcycling?", o:["Throwing things away","Donating old clothes","Transforming waste into better products","Buying more items"], c:2, f:"Upcycling transforms discarded materials into higher-value products, reducing waste."},
        {q:"What does washing synthetic clothes release?", o:["Vitamins","Microplastics","Fresh scent","Oxygen"], c:1, f:"Each wash of synthetic clothing releases approximately 700,000 microplastic fibres into waterways."},
        {q:"How much water does the fashion industry use yearly?", o:["1 billion litres","93 billion cubic metres","500 million litres","20 billion litres"], c:1, f:"The fashion industry uses approximately 93 billion cubic metres of water yearly."},
        {q:"Which country exports the most used clothing?", o:["China","USA","Germany","UK"], c:1, f:"The USA exports over 700,000 tonnes of used clothing annually, more than any other country."},
        {q:"What percentage of clothing is recycled globally?", o:["Less than 1%","12%","25%","40%"], c:0, f:"Less than 1% of clothing is recycled into new garments. Most recycled textiles become rags or insulation."},
        {q:"How many garments are produced globally each year?", o:["10 billion","50 billion","100 billion","150 billion"], c:2, f:"Over 100 billion garments are produced each year -- about 14 for every person on Earth."},
        {q:"What is 'fast fashion'?", o:["Quick delivery","Cheap rapid-cycle clothing","Athletic wear","Express tailoring"], c:1, f:"Fast fashion produces cheap clothing rapidly to match trends, often at great environmental cost."},
        {q:"Which fiber has the lowest water footprint?", o:["Cotton","Polyester","Linen","Nylon"], c:2, f:"Linen (from flax) uses far less water than cotton and can grow in poor soil without irrigation."},
    ];

    let triviaUsed = [];
    let triviaResolve = null;
    let ecoScore = 0;

    function getRandomTrivia() {
        if (triviaUsed.length >= ECO_TRIVIA.length) triviaUsed = [];
        let available = ECO_TRIVIA.filter((_, i) => !triviaUsed.includes(i));
        let idx = Math.floor(Math.random() * available.length);
        let realIdx = ECO_TRIVIA.indexOf(available[idx]);
        triviaUsed.push(realIdx);
        return available[idx];
    }

    function showEcoTrivia() {
        return new Promise(function(resolve) {
            triviaResolve = resolve;
            const q = getRandomTrivia();
            document.getElementById('triviaQ').textContent = q.q;
            const oc = document.getElementById('triviaOpts');
            const rc = document.getElementById('triviaRes');
            rc.className = 'trivia-result'; rc.style.display = 'none';
            document.getElementById('triviaSkipBtn').style.display = '';
            const letters = ['A','B','C','D'];
            oc.innerHTML = q.o.map(function(o, i) {
                return '<button class="trivia-opt" data-i="' + i + '"><span class="opt-letter">' + letters[i] + '</span><span>' + o + '</span></button>';
            }).join('');

            oc.querySelectorAll('.trivia-opt').forEach(function(b) {
                b.onclick = function() {
                    var i = parseInt(b.dataset.i);
                    var ok = i === q.c;
                    oc.querySelectorAll('.trivia-opt').forEach(function(x, j) {
                        x.style.pointerEvents = 'none';
                        if (j === q.c) x.classList.add('correct');
                        if (j === i && !ok) x.classList.add('wrong');
                    });
                    document.getElementById('triviaSkipBtn').style.display = 'none';
                    if (ok) {
                        ecoScore += 50;
                        rc.className = 'trivia-result show correct-r';
                        rc.innerHTML = '<strong>Correct! +50 Eco Points</strong><br><br>' + q.f;
                        showScorePopup('+50 Eco Points!');
                    } else {
                        rc.className = 'trivia-result show wrong-r';
                        rc.innerHTML = '<strong>Not quite!</strong><br><br>' + q.f;
                    }
                    setTimeout(dismissTrivia, 3500);
                };
            });

            document.getElementById('eco-trivia-overlay').classList.add('active');
        });
    }

    function dismissTrivia() {
        document.getElementById('eco-trivia-overlay').classList.remove('active');
        if (triviaResolve) {
            triviaResolve(true);
            triviaResolve = null;
        }
    }

    function showScorePopup(text) {
        var popup = document.getElementById('ecoScorePopup');
        popup.textContent = text;
        popup.classList.add('show');
        setTimeout(function() { popup.classList.remove('show'); }, 2500);
    }
    </script>

    <!-- Poki SDK stub with trivia integration -->
    <script>
    document.xURL = "https://poki.com/";

    if (typeof consoleLog == 'undefined') {
        consoleLog = function() {}; // silence debug logs
    }

    var originalEval = eval;
    evalx = function() {
        arguments[0] = arguments[0].replace("aHR0cHM6Ly9wb2tpLmNvbS9zaXRlbG9jaw==", "I3ViZzIzNQ==");
        arguments[0] = arguments[0].replace("'location'", "'xlocation'");
        return originalEval.apply(this, arguments);
    }

    navigator.sendBeacon = function() {}
    WebSocket = function() {}

    xlocation = new Proxy(location, {
        get: function(target, property, receiver) {
            let targetObj = target[property];
            if (typeof targetObj == "function") {
                return function() { return target[property].apply(target, arguments); };
            } else {
                if (property == "host" || property == "hostname") return "localhost";
                if (property == "href") return "https://localhost/";
                if (property == "origin") return "https://localhost/";
                return targetObj;
            }
        },
        set: function(target, property, receiver) { return true; }
    });

    xwindow = new Proxy(window, {
        get: function(target, property, receiver) {
            if (typeof target[property] == "function") {
                return function() { return target[property].apply(target, arguments); };
            } else {
                if (property == "location") return target["xlocation"];
                return target[property];
            }
        }
    });

    PokiSDK = function() {
        this.getURLParam = function(name) { return ""; }

        this.init = function() {
            return new Promise(function(resolve) { resolve("InitDone"); });
        }

        this.setDebug = function() {}
        this.setDebugTouchOverlayController = function() {}
        this.isAdBlocked = function() { return false; }
        this.happyTime = function() {}

        // Loading
        this.gameLoadingStart = function() {}
        this.gameLoadingProgress = function() {}
        this.gameLoadingFinished = function() {}

        // Game control
        this.gameplayStart = function() {}
        this.gameplayStop = function() {}

        // Ad breaks replaced with sustainability trivia
        this.commercialBreak = function() {
            return showEcoTrivia();
        }

        this.rewardedBreak = function() {
            return showEcoTrivia();
        }

        this.displayAd = function() {}
        this.destroyAd = function() {}
    }

    PokiSDK.prototype.initWithVideoHB = function() {
        return new Promise(function(resolve) { resolve(""); });
    }

    PokiSDK.prototype.customEvent = function() {}

    PokiSDK = new PokiSDK();
    </script>
